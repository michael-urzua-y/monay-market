<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Monay Market</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo-crown.png') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #111827 100%);
            color: #f1f5f9;
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; padding: 20px;
        }
        .login-wrapper {
            width: 100%; max-width: 420px;
        }
        .login-card { 
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(201,149,42,0.2);
            padding: 48px 40px 40px; border-radius: 20px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
        }
        .login-logo {
            width: 160px; margin: 0 auto 24px;
        }
        .login-logo img {
            width: 100%; height: auto; object-fit: contain;
        }
        .login-title { 
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 1.8rem; font-weight: 700; margin: 0 0 4px 0; 
            background: linear-gradient(135deg, #f0d060, #c9952a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; letter-spacing: 3px;
        }
        .login-subtitle { 
            color: #94a3b8; font-size: 0.9rem; margin-bottom: 32px;
            letter-spacing: 1px;
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { 
            display: block; font-size: 0.85rem; font-weight: 600; 
            color: #94a3b8; margin-bottom: 8px; letter-spacing: 0.5px;
        }
        input { 
            width: 100%; padding: 14px 16px; 
            border: 1px solid rgba(201,149,42,0.25);
            background: rgba(255,255,255,0.05);
            border-radius: 10px; font-size: 1rem; color: #f1f5f9; 
            transition: all 0.3s;
        }
        input::placeholder { color: #64748b; }
        input:focus { 
            outline: none; 
            border-color: #c9952a; 
            box-shadow: 0 0 0 3px rgba(201,149,42,0.15);
            background: rgba(255,255,255,0.08);
        }
        .login-btn { 
            width: 100%; border: none; 
            padding: 15px; border-radius: 10px; font-size: 1rem; font-weight: 700; 
            cursor: pointer; transition: all 0.3s; margin-top: 12px;
            background: linear-gradient(135deg, #c9952a, #d4a843);
            color: #0f0f1a; letter-spacing: 1px;
        }
        .login-btn:hover { 
            background: linear-gradient(135deg, #d4a843, #f0d060);
            box-shadow: 0 4px 15px rgba(201,149,42,0.3);
            transform: translateY(-1px);
        }
        .login-error { 
            background: rgba(220,38,38,0.1); color: #fca5a5; padding: 12px; 
            border-radius: 10px; font-size: 0.9rem; margin-bottom: 20px; 
            border: 1px solid rgba(220,38,38,0.3);
        }
        .login-footer {
            text-align: center; margin-top: 24px; 
            color: #475569; font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <img src="{{ url_for('static', filename='logo-crown.png') }}" alt="Monay Market">
            </div>
            <h1 class="login-title">MONAY MARKET</h1>
            <div class="login-subtitle">Panel de Administración</div>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="admin@tienda.com" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn">Ingresar al Panel</button>
            </form>
        </div>
        <div class="login-footer">© 2026 Monay Market — Todos los derechos reservados</div>
    </div>
</body>
</html>
